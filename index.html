<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snakes & Ladders</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>🐍 Snakes & Ladders</h1>

  <!-- Game board (REQUIRED) -->
  <div id="board"></div>

  <!-- Controls -->
  <div id="panel">
    <button onclick="rollDice()">Roll Dice</button>

    <!-- Dice image (REQUIRED) -->
    <div>
      <img id="diceImg" src="assets/dice-1.png" width="70" />
    </div>

    <!-- Game log (REQUIRED) -->
    <div id="log"></div>
  </div>

  <!-- Load game script -->
  <script src="game.js"></script>

</body>
</html>
