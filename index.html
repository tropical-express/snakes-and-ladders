<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snakes & Ladders</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="container">

    <h1>🐍 Snakes & Ladders 🪜</h1>

    <div id="gameArea">

      <img
        id="board"
        src="assets/board.png"
        alt="Snakes and Ladders Board"
      >

      <img
        id="p1"
        class="token"
        src="assets/red.png"
        alt="Player 1"
      >

      <img
        id="p2"
        class="token"
        src="assets/blue.png"
        alt="Player 2"
      >

    </div>

    <div id="controls">

      <img
        id="diceImg"
        src="assets/dice-1.png"
        alt="Dice"
      >

      <button id="rollBtn">
        Roll Dice
      </button>

      <button
        id="restartBtn"
        style="display:none;"
      >
        Play Again
      </button>

    </div>

    <div id="log">
      Player 1 starts
    </div>

  </div>

  <script src="game.js"></script>

</body>
</html>
